<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/submit" method="post">
        Name:<input name="n" placeholder="name">
        <br>
        Email:<input name="e" placeholder="email">
        <br>
        Message:<textarea name="msg" cols="15" rows="3"></textarea>
        <br>
        <p>Rating:</p>
        bad <input type="radio" value="bad" name="r">
        <br>
        average <input type="radio" value="average" name="r">
        <br>
        good <input type="radio" value="good" name="r">
        <br>
        very good <input type="radio" value="very good" name="r">
        <br>
        excellent <input type="radio" value="excellent" name="r">
        <br>
        <input type="submit">
</body>
</html>
